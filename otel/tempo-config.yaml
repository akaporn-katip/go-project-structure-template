server:
  http_listen_port: 3200
stream_over_http_enabled: true

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
# --- 1. NEW: Configure the Metrics Generator ---
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: local-dev
  storage:
    path: /var/tempo/generator/wal
    # This automatically pushes trace-derived metrics to Mimir!
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true

# --- 2. NEW: Override defaults to turn the processors on ---
overrides:
  metrics_generator_processors: [service-graphs, span-metrics, local-blocks]
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
