apiVersion: 1

datasources:
  # 1. Prometheus (Mimir)
  - name: Mimir
    type: prometheus
    url: http://mimir:9009/prometheus  # Must match the service key in compose

  # 2. Loki (Logs)
  - name: Loki
    type: loki
    uid: loki-ds
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        # This regex looks for trace_id in your logs and creates a link to Tempo
        - datasourceUid: tempo-ds
          matcherRegex: '"traceid":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}"

  # 3. Tempo (Traces)
  - name: Tempo
    type: tempo
    uid: tempo-ds
    url: http://tempo:3200
    access: proxy
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki-ds # Must match the Loki UID above
        # Map OTLP 'service.name' to Loki 'container' label
        tags:
          - key: 'service.name'
            value: 'service_name'
        # Expands the search window slightly to catch logs written just before/after the span
        spanStartTimeShift: '-1s'
        spanEndTimeShift: '1s'
        # Set to true if your logs reliably contain the trace ID
        # filterByTraceID: true
        # filterBySpanID: true

        customQuery: true
        query: '{$${__tags}} | json | traceid="$${__span.traceId}" spanid="$${__span.spanId}"'