
server:
  port: ":8081"
  env: "development"

database:
  # type: "sqlite3" # postgres , mongodb , sqlite3
  # dsn: "sqlite3://db.sqlite"

  type: "postgres" # postgres , mongodb , sqlite3
  dsn: "postgres://user:password@localhost:5432/myapp_db?sslmode=disable"

  # type: "mongodb"
  # dsn: "mongodb://admin:password@localhost:27017/app?authSource=admin"

  max_open_conns: 25
  max_idle_conns: 5

observability:
  enabled: true
  otlp_protocol: grpc  # Use 'grpc' for remote OTLP collector, 'stdout' for local development
  otlp_endpoint: "localhost:4317"
  service_name: "crm-api"
  environment: "development"
  service_version: "1.0.0"
  metrics_interval: 60s
  enable_metrics: true
  enable_tracing: true
  enable_logging: true
  log_level: "debug"  # Options: debug, info, warn, error
  trace_sample_rate: 0.1   # Sample 10% of traces in production
